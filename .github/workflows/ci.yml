name: CI

on:
  push:
    branches: ["master", "develop"]
  pull_request:
    branches: ["master", "develop"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # CTO 2026-07-21 (option (a) — PR #201 / #194): ase-rs is a PRIVATE repo.
  # The default GITHUB_TOKEN cannot read it, and `persist-credentials: false`
  # (the prior 5 failed CI-fix commits) stripped the only credential and
  # failed with `could not read Username` (exit 128). The approved fix exposes
  # an ase-rs read-access PAT as repo secret CARGO_ASE_RS_TOKEN, plus
  # GIT_ASKPASS pointing at .github/scripts/ase-rs-askpass.sh, so cargo (via
  # net.git-fetch-with-cli = true in .cargo/config.toml) authenticates the git
  # fetch of the 4 ase crates pinned in Cargo.lock. Auth is NOT feature-gated:
  # schema-diff is a workspace member and Cargo.lock pins ase-rs rev 2bc35515,
  # so EVERY `cargo --workspace` op resolves that git source on EVERY job
  # (Lint / Test matrix / Coverage / Build Docs), not only --all-features.
  CARGO_ASE_RS_TOKEN: ${{ secrets.CARGO_ASE_RS_TOKEN }}
  GIT_ASKPASS: ${{ github.workspace }}/.github/scripts/ase-rs-askpass.sh
  # T-WINDOWS-1 (PR #201): Windows runners fail the ase-rs git fetch with
  # `fatal: Cannot prompt because user interactivity has been disabled` +
  # `bash: line 1: /dev/tty: No such file or directory` + `error: failed to
  # execute prompt script (exit code 1)`, because git-for-Windows tries a TTY
  # prompt (no controlling terminal exists on a CI runner) and aborts BEFORE
  # GIT_ASKPASS can supply the PAT. GIT_TERMINAL_PROMPT=0 forces git to rely
  # solely on GIT_ASKPASS and never block on an interactive prompt. Harmless
  # on ubuntu/macos (no TTY prompt is attempted there anyway).
  GIT_TERMINAL_PROMPT: "0"

jobs:
  # ==================== Lint & Format ====================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v6
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v6
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ==================== Test ====================
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-${{ matrix.rust }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v6
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.rust }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v6
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.rust }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --workspace --verbose

      - name: Run tests
        run: cargo test --workspace --verbose

      - name: Run doc tests
        run: cargo test --workspace --doc

  # ==================== Coverage ====================
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: false

      - name: Generate coverage report (HTML)
        run: cargo llvm-cov --workspace --html --output-dir coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/

  # ==================== Security ====================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ==================== Docs ====================
  docs:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build documentation
        run: cargo doc --workspace --no-deps --all-features

      - name: Upload documentation
        uses: actions/upload-artifact@v7
        with:
          name: docs
          path: target/doc/
