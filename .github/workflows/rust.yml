name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
      # T9.6 (CTO 2026-07-21 PR #201): see ci.yml lint job note. Stops the
      # workspace GITHUB_TOKEN from leaking as an Authorization header when
      # cargo resolves the ase-rs git upstream (public-read repo) during
      # `cargo build` / `cargo test`. Without this, ase-rs fetch fails with
      # exit 128 / `revision ... not found`.
      persist-credentials: false
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
