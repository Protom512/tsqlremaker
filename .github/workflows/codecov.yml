name: "Rust CodeCov"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - uses: actions-rs/toolchain@v1
      with:
        toolchain: nightly
        override: true
        components: llvm-tools-preview
    - name: Install llvm-tools
      run: rustup component add llvm-tools-preview
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
      env:
        CARGO_INCREMENTAL: '0'
        RUSTFLAGS: '-C instrument-coverage'
        RUSTDOCFLAGS: '-C instrument-coverage'
        LLVM_PROFILE_FILE: 'coverage-%p-%m.profraw'
    - name: Generate coverage data
      run: |
        # Find all profraw files
        find . -name '*.profraw' -type f
        # Convert profraw to profdata
        $(rustc --print sysroot)/lib/rustlib/x86_64-unknown-linux-gnu/bin/llvm-profdata merge \
          -sparse $(find . -name '*.profraw' -printf '%p:') -o coverage.profdata
        # Show what was generated
        ls -la coverage.profdata
    - name: rust-grcov
      uses: actions-rs/grcov@v0.1
      with:
        config: .github/actions-rs/grcov.yml
    - name: Codecov
      uses: codecov/codecov-action@v4
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      with:
        verbose: true
        fail_ci_if_error: false
        files: ./lcov.info
