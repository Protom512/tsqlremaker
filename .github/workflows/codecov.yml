name: "Rust CodeCov"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always
  # CTO 2026-07-21 (option (a) — PR #201 / #194): see ci.yml env note. ase-rs
  # is PRIVATE; the default GITHUB_TOKEN cannot read it. This workflow runs
  # `cargo build` / `cargo test` (workspace-wide), which resolve the ase-rs
  # git source pinned in Cargo.lock, so the PAT auth must be present here too.
  CARGO_ASE_RS_TOKEN: ${{ secrets.CARGO_ASE_RS_TOKEN }}
  GIT_ASKPASS: ${{ github.workspace }}/.github/scripts/ase-rs-askpass.sh
  # T-WINDOWS-1 (PR #201): Windows /dev/tty blocker — see ci.yml note.
  GIT_TERMINAL_PROMPT: "0"

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - uses: actions-rs/toolchain@v1
      with:
        toolchain: nightly
        override: true
        components: llvm-tools-preview
    - name: Install llvm-tools
      run: rustup component add llvm-tools-preview
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
      env:
        CARGO_INCREMENTAL: '0'
        RUSTFLAGS: '-C instrument-coverage'
        RUSTDOCFLAGS: '-C instrument-coverage'
        LLVM_PROFILE_FILE: 'coverage-%p-%m.profraw'
    - name: Install grcov
      run: cargo install grcov
    - name: Generate coverage report
      run: |
        grcov . --binary-path ./target/debug/ \
          -s . \
          -t lcov \
          --branch \
          --ignore-not-existing \
          --ignore '../*' \
          --ignore "/*" \
          -o lcov.info
    - name: Codecov
      uses: codecov/codecov-action@v7
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      with:
        verbose: true
        fail_ci_if_error: false
        files: ./lcov.info
