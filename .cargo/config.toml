# T9.0 (CTO 2026-07-14 condition #2 — collapsed): route Cargo's git fetches
# through the system `git` CLI instead of the bundled libgit2.
#
# The `schema-diff` `ase` feature pulls optional crates from the public
# upstream `https://github.com/Sou-Tokuda/ase-rs` (verified public-read: a
# clean `git clone --depth 1` succeeds and `git ls-remote` lists every ref
# including `refs/heads/main` = `2bc35515`). On CI, however, Cargo's default
# libgit2-based fetch fails the GitHub auth handshake and surfaces as
# `revision ... not found / failed to authenticate ... credential.helper`
# (see PR #201 build logs). `net.git-fetch-with-cli = true` makes Cargo shell
# out to `git`, which performs the public-read clone correctly.
#
# Placement: this MUST live at the WORKSPACE ROOT (not under
# `crates/schema-diff/.cargo/`) because Cargo discovers config by walking UP
# from the invocation cwd, and CI runs workspace-wide commands
# (`cargo build`, `cargo nextest run --workspace`, `cargo clippy --workspace`)
# from the repo root. A crate-local config would be invisible to those
# commands (this was the first attempted fix — see the reverted commit).
#
# The setting has zero effect on the default (ase-rs-free) build: the
# upstream is only resolved under `--features ase`, so `git-fetch-with-cli`
# only engages when that feature is on.
#
# Refs:
#   - https://doc.rust-lang.org/cargo/reference/config.html#netgit-fetch-with-cli
#   - design.md §0.1 (feature-gate ACL) / §6.1 (5-dep ase-rs workspace split)
[net]
git-fetch-with-cli = true

# T9.6 (CTO 2026-07-21 blocker resolution — PR #201): clear the Authorization
# header Cargo/git would otherwise send when fetching the ase-rs upstream.
#
# Root cause: `actions/checkout@v7` runs with `persist-credentials: true`
# (default), which writes the tsqlremaker-scoped GITHUB_TOKEN into
# `http.https://github.com/.extraheader`. `includeIf.gitdir` scopes that
# credential to the workspace gitdir, so when cargo (shelling out to git via
# `git-fetch-with-cli = true` above) fetches the *separate public* repo
# `github.com/Sou-Tokuda/ase-rs`, git sends the foreign-repo token as an
# Authorization header. GitHub rejects the invalid-scope token (401/403) with
# no anonymous fallback, surfacing as `revision ... not found` / exit 128
# -> CI 7/9 red on PR #201.
#
# Fix: clear `extraHeader` for the ase-rs URL specifically. ase-rs is verified
# public-read (`git ls-remote https://github.com/Sou-Tokuda/ase-rs` succeeds
# anonymously, HEAD = main = 2bc35515), so cargo now fetches it without any
# credential. This stanza is URL-scoped to the ase-rs repo and therefore does
# NOT affect tsqlremaker's own checkout authentication.
#
# Key spelling note: cargo config uses `extraHeader` (camelCase), the
# cargo-native key documented at
# https://doc.rust-lang.org/cargo/reference/config.html#httpextra-header
# (distinct from git config's lowercase `extraheader`).
#
# Refs:
#   - design.md §6.1 (CI note added alongside this stanza)
#   - PR #201 build logs (ase-rs fetch failures)
[http."https://github.com/Sou-Tokuda/ase-rs"]
extraHeader = ""
